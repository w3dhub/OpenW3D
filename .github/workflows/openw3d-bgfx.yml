name: openw3d-bgfx

on:
  workflow_dispatch:  # Allow manual trigger
  push:
    branches: [fix/review-pr3]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-bgfx:
    name: BGFX ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 38
    defaults:
      run:
        shell: ${{ matrix.shell }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: MSVC x64 BGFX
            os: windows-latest
            cmake-args: -GNinja -DCMAKE_BUILD_TYPE=Release -DENABLE_BGFX_BACKEND=ON -DWANT_DX9=OFF
            shell: pwsh
            arch: x64
          - name: MinGW x64 BGFX
            os: windows-latest
            cmake-args: -DENABLE_BGFX_BACKEND=ON -DWANT_DX9=OFF -GNinja -DCMAKE_BUILD_TYPE=Release
            build-args: --target combat combate renegade renegadeserver ww3d2e wwaudioe wwphyse
            msys2: true
            msys2-msystem: mingw64
            msys2-env: mingw-w64-x86-64
            shell: msys2 {0}

    steps:
    - name: 'Set up MSYS2'
      if: ${{ !!matrix.msys2 }}
      uses: msys2/setup-msys2@v2
      with:
        msystem: ${{ matrix.msys2-msystem }}
        install: >-
          ${{ matrix.msys2-env }}-cc
          ${{ matrix.msys2-env }}-cmake
          ${{ matrix.msys2-env }}-ninja
          ${{ matrix.msys2-env }}-pkg-config

    - name: 'Set up MSVC dev cmd'
      if: ${{ !matrix.msys2 }}
      uses: ilammy/msvc-dev-cmd@v1.13.0
      with:
        arch: ${{ matrix.arch }}

    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: 'Build bgfx (MSVC)'
      if: ${{ !matrix.msys2 }}
      run: |
        cd external/bgfx
        ..\..\bx\tools\bin\windows\genie.exe vs2022
        msbuild .build\projects\vs2022\bgfx.sln /p:Configuration=Release /p:Platform=x64 /m
        cd ../..

    - name: 'CMake (configure)'
      env:
        W3D_COMPILER_FLAGS: ${{ matrix.options }}
      run: |
        cmake -S . -B build ${{ matrix.cmake-args }}

    - name: 'CMake (build)'
      run: |
        cmake --build build --parallel ${{ matrix.build-args }}

    - name: 'Upload build artifacts'
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: openw3d-bgfx-${{ matrix.name }}
        path: |
          build/*.exe
          build/*.dll
          build/shaders/
        retention-days: 14
